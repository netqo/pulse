name: Bug report
description: Report a defect in Pulse
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for filing a bug. Please provide enough detail for a reviewer to reproduce it.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Affected component
      options:
        - Fetcher
        - Processor
        - Alerting
        - API
        - SQL Playground / Frontend
        - Database / Migrations
        - Observability
        - CI/CD / Tooling
        - Other / Unknown
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Docker version, commit SHA, and browser (for UI issues).
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant logs or attach screenshots. Redact any secrets.
      render: shell
    validations:
      required: false
