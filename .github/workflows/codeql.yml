name: CodeQL

# Static application security testing. Analyzes only the languages actually
# present in the tree (gated via the reusable detector) so it never fails on an
# empty scaffold, and runs on a weekly schedule to catch newly disclosed rules.

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  schedule:
    - cron: '27 3 * * 1'

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect:
    uses: ./.github/workflows/reusable-detect.yml

  analyze:
    name: Analyze
    needs: detect
    if: needs.detect.outputs.codeql_languages != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJSON(needs.detect.outputs.codeql_languages) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
