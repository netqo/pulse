version: 2

# Supply-chain hygiene: keep every ecosystem's dependencies patched. Entries for
# gomod, npm and docker stay idle until their manifests land, then activate
# automatically. Grouped updates keep PR noise low.

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    labels:
      - dependencies
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: build
    labels:
      - dependencies
    open-pull-requests-limit: 10
    groups:
      go-minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
    commit-message:
      prefix: build
    labels:
      - dependencies
    open-pull-requests-limit: 10
    groups:
      npm-minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: docker
    directories:
      - /cmd/*
    schedule:
      interval: weekly
    commit-message:
      prefix: build
    labels:
      - dependencies
