name: CI

# Continuous integration for every PR and for pushes to the long-lived branches.
# Jobs are gated on component detection so the pipeline is green on the current
# scaffold and activates each check the moment its component lands.

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  detect:
    uses: ./.github/workflows/reusable-detect.yml

  go:
    name: Go (vet, lint, build, test)
    needs: detect
    if: needs.detect.outputs.go == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pulse
          POSTGRES_PASSWORD: pulse
          POSTGRES_DB: pulse_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pulse -d pulse_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://pulse:pulse@localhost:5432/pulse_test?sslmode=disable
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Verify modules are tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

      - name: Build
        run: go build ./...

      - name: Test (race + coverage)
        run: go test -race -covermode=atomic -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: coverage.out
          if-no-files-found: ignore

  migrations:
    name: Migration round-trip
    needs: detect
    if: needs.detect.outputs.migrations == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pulse
          POSTGRES_PASSWORD: pulse
          POSTGRES_DB: pulse_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pulse -d pulse_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      MIGRATE_VERSION: v4.18.1
      DATABASE_URL: postgres://pulse:pulse@localhost:5432/pulse_test?sslmode=disable
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install golang-migrate
        run: |
          set -euo pipefail
          url="https://github.com/golang-migrate/migrate/releases/download/${MIGRATE_VERSION}/migrate.linux-amd64.tar.gz"
          curl -fsSL "$url" | tar xz migrate
          sudo mv migrate /usr/local/bin/migrate
          migrate -version

      - name: Apply all up migrations
        run: migrate -path migrations -database "$DATABASE_URL" up

      - name: Roll back all down migrations
        run: migrate -path migrations -database "$DATABASE_URL" down -all

      - name: Re-apply up migrations (idempotency)
        run: migrate -path migrations -database "$DATABASE_URL" up

  web:
    name: Frontend (typecheck, lint, build)
    needs: detect
    if: needs.detect.outputs.web == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint --if-present

      - name: Build
        run: npm run build --if-present

  images:
    name: Build image
    needs: detect
    if: needs.detect.outputs.services != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.detect.outputs.services) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: cmd/${{ matrix.service }}/Dockerfile
          push: false
          tags: pulse/${{ matrix.service }}:ci
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  ci-success:
    name: CI success
    if: always()
    needs: [detect, go, migrations, web, images, secrets]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Aggregate results
        shell: bash
        run: |
          set -euo pipefail
          results='${{ join(needs.*.result, ',') }}'
          echo "Upstream job results: $results"
          IFS=',' read -ra arr <<< "$results"
          for r in "${arr[@]}"; do
            if [[ "$r" == "failure" || "$r" == "cancelled" ]]; then
              echo "::error::A required job did not pass (result: $r)."
              exit 1
            fi
          done
          echo "All required checks passed or were skipped."
