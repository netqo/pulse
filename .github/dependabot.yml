version: 2

# Supply-chain hygiene: keep every ecosystem's dependencies patched. Entries for
# gomod and docker stay idle until their manifests land, then activate
# automatically. Grouped updates keep PR noise low. The web frontend uses Bun,
# whose lockfile Dependabot does not yet support, so its dependencies are updated
# manually (for example `bun update`) rather than via an npm ecosystem entry.

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    labels:
      - dependencies
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: build
    labels:
      - dependencies
    open-pull-requests-limit: 10
    groups:
      go-minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: docker
    directories:
      - /cmd/*
    schedule:
      interval: weekly
    commit-message:
      prefix: build
    labels:
      - dependencies
