# golangci-lint configuration (schema v2).
# Curated high-signal linters on top of the defaults, plus formatters.

version: "2"

run:
  timeout: 5m

linters:
  enable:
    - bodyclose
    - gocritic
    - misspell
    - revive
    - unconvert
    - unparam
  # web/ is the TypeScript frontend; its node_modules can vendor stray Go files
  # (for example flatted's golang example), which are not part of this module.
  exclusions:
    paths:
      - ^web/
  settings:
    misspell:
      locale: US

formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    paths:
      - ^web/
  settings:
    goimports:
      local-prefixes:
        - github.com/netqo/pulse
